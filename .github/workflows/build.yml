name: Build & Push

on:
  push:
    branches: [main]
    paths:
      - 'Dockerfile'
      - '.github/workflows/build.yml'
  workflow_dispatch:
    inputs:
      workflow_version:
        description: 'Workflow package version (defaults to Dockerfile value)'
        required: false
        type: string
      workflow_target_world:
        description: 'Workflow world package (defaults to @workflow/world-postgres)'
        required: false
        type: string
      latest:
        description: 'Also tag as latest'
        required: false
        type: boolean
        default: true

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Log in to GHCR
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4

      - name: Resolve tag
        id: meta
        run: |
          VERSION="${{ inputs.workflow_version }}"
          if [ -z "$VERSION" ]; then
            VERSION=$(grep -oP 'WORKFLOW_VERSION=\K[^\s]+' Dockerfile)
          fi
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "tag=${VERSION:-${GITHUB_SHA::7}}" >> "$GITHUB_OUTPUT"

      - name: Build and push
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f # v7
        with:
          push: true
          build-args: |
            WORKFLOW_VERSION=${{ steps.meta.outputs.version }}
            ${{ inputs.workflow_target_world && format('WORKFLOW_TARGET_WORLD={0}', inputs.workflow_target_world) || '' }}
          tags: |
            ghcr.io/somospollo/vercel-workflow-postgres:${{ steps.meta.outputs.tag }}
            ${{ (inputs.latest == true || inputs.latest == '') && 'ghcr.io/somospollo/vercel-workflow-postgres:latest' || '' }}
